<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat - Static UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
  </head>

  <body class="h-screen flex bg-gray-100">
    <aside
      class="hidden md:flex w-64 flex-shrink-0 bg-gray-900 text-white flex-col"
    >
      <div class="p-4 border-b border-gray-700">
        <button
          class="w-full rounded-lg bg-blue-600 hover:bg-blue-500 px-3 py-2 font-semibold"
        >
          + Create a new chat
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto p-2 space-y-1">
        <a href="#" class="block px-3 py-2 rounded-lg bg-gray-700">
          Web App Dev
        </a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-gray-700">
          Assignment A2
        </a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-gray-700">
          Random Ideas
        </a>

        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-gray-700">
          Protein Tracking
        </a>
      </nav>
    </aside>

    <main class="flex flex-col flex-1 bg-white">
      <div class="flex-1 overflow-y-auto p-6 space-y-4">
        <chat-message role="ai"> Hi! How can i help you? </chat-message>

        <chat-message role="user">
          To make sure, tell me sidebar is on the left and chat is on the right?
        </chat-message>

        <chat-message role="ai">
          Exactly. Messages scroll, and the input stays pinned to the bottom.
        </chat-message>

        <chat-message role="user"> Thanks. </chat-message>
      </div>

      <div class="border-t bg-white p-4">
        <div class="flex gap-2 items-end max-w-3xl mx-auto">
          <textarea
            class="flex-1 resize-none rounded-xl border px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            rows="1"
            placeholder="Message AI..."
          ></textarea>
          <button
            class="bg-blue-600 text-white rounded-xl px-4 py-2 flex-shrink-0 hover:bg-blue-500"
          >
            Send
          </button>
        </div>
      </div>
    </main>

    <script>
      class ChatMessage extends HTMLElement {
        connectedCallback() {
          const role = this.getAttribute("role") || "ai";
          const align = role === "user" ? "justify-end" : "justify-start";
          const bubbleClasses =
            role === "user"
              ? "bg-blue-600 text-white"
              : "bg-gray-100 text-gray-800 border border-gray-200";

          this.innerHTML = `
            <div class="flex ${align}">
              <div class="${bubbleClasses} rounded-2xl px-4 py-2 max-w-[60%]">
                ${this.textContent.trim()}
              </div>
            </div>
          `;
        }
      }
      customElements.define("chat-message", ChatMessage);
    </script>
  </body>
</html>
